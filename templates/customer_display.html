<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Display – KiranaBuddy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden; /* prevent page-level scroll */
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f1f5f9;
        color: #1e293b;
        height: 100vh; /* fixed viewport height — same as cart panel */
        display: flex;
        flex-direction: column;
      }
      /* ── Header — fixed, never shrinks ── */
      .hdr {
        background: linear-gradient(135deg, #166534, #15803d);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.18);
        flex-shrink: 0;
      }
      .shop-name {
        font-size: 1.9rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.5px;
      }
      .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.18);
        padding: 6px 18px;
        border-radius: 20px;
        font-size: 0.82rem;
        color: #dcfce7;
        font-weight: 700;
        letter-spacing: 0.06em;
      }
      .live-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }
      /* ── Idle ── */
      .idle {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        padding: 40px;
        background: #f8fafc;
      }
      .idle-icon {
        font-size: 6rem;
        opacity: 0.25;
      }
      .idle-title {
        font-size: 2.1rem;
        color: #94a3b8;
        font-weight: 700;
      }
      .idle-sub {
        font-size: 1.1rem;
        color: #cbd5e1;
      }
      /* ── Active — mirrors .pos-right cart layout ── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 16px 24px 20px;
        gap: 14px;
        overflow: hidden;
        background: #f1f5f9;
      }
      /* Only this scrolls — same as .pos-cart-items */
      .items-wrap {
        flex: 1;
        overflow-y: auto;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
        border: 1px solid #e2e8f0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        padding: 13px 20px;
        font-size: 0.78rem;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border-bottom: 2px solid #f1f5f9;
        background: #fff;
        text-align: left;
        position: sticky;
        top: 0;
      }
      thead th.r {
        text-align: right;
      }
      tbody tr {
        border-bottom: 1px solid #f8fafc;
        transition: background 0.5s;
      }
      tbody tr.hi {
        background: #f0fdf4;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody td {
        padding: 15px 20px;
      }
      .td-name {
        color: #0f172a;
        font-weight: 700;
        font-size: 1.25rem;
      }
      .td-qty {
        color: #64748b;
        font-size: 1rem;
        font-weight: 600;
      }
      .td-rate {
        color: #94a3b8;
        font-size: 0.95rem;
      }
      .td-amt {
        text-align: right;
        color: #16a34a;
        font-weight: 800;
        font-size: 1.3rem;
      }
      /* ── Summary panel (subtotal + tax + total) — pinned at bottom ── */
      .summary-panel {
        background: #fff;
        border-radius: 14px;
        border: 1px solid #e2e8f0;
        flex-shrink: 0;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 24px;
        border-bottom: 1px solid #f1f5f9;
        font-size: 1rem;
        color: #64748b;
        font-weight: 600;
      }
      .summary-row.tax-row {
        color: #d97706;
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .total-bar {
        background: linear-gradient(135deg, #15803d, #166534);
        padding: 18px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .total-label {
        font-size: 1.2rem;
        color: #bbf7d0;
        font-weight: 600;
      }
      .total-amt {
        font-size: 3rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: -1px;
      }
      /* ── Thank-you ── */
      .ty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        background: #f0fdf4;
      }
      .ty-icon {
        font-size: 6rem;
      }
      .ty-title {
        font-size: 3rem;
        font-weight: 900;
        color: #15803d;
      }
      .ty-hindi {
        font-size: 1.8rem;
        color: #16a34a;
      }
      .ty-total {
        font-size: 1.4rem;
        color: #64748b;
        margin-top: 8px;
      }
      /* ── Status bar — fixed at very bottom ── */
      .sbar {
        background: #fff;
        padding: 8px 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        color: #94a3b8;
        border-top: 1px solid #e2e8f0;
        flex-shrink: 0;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="hdr">
      <div class="shop-name" id="shopName">🛒 KiranaBuddy</div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span>LIVE DISPLAY</span>
      </div>
    </div>

    <!-- Idle / welcome state -->
    <div class="idle" id="idleScreen">
      <div class="idle-icon">🛒</div>
      <div class="idle-title">Welcome! &nbsp;/&nbsp; स्वागत है!</div>
      <div class="idle-sub">
        Your items will appear here as they are scanned.
      </div>
      <div class="idle-sub" style="color: #334155; margin-top: 4px">
        आपके सामान यहाँ दिखेंगे।
      </div>
    </div>

    <!-- Active scanning state -->
    <div class="main" id="activeScreen" style="display: none">
      <div class="items-wrap">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Qty</th>
              <th>Rate</th>
              <th class="r">Amount</th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <!-- Subtotal + tax rows -->
      <div class="summary-panel" id="summaryPanel">
        <div class="summary-row" id="subtotalRow" style="display: none">
          <span>Subtotal</span>
          <span id="subtotalAmt">₹ 0.00</span>
        </div>
        <div class="summary-row tax-row" id="taxRow" style="display: none">
          <span id="taxLabel">GST (0%)</span>
          <span id="taxAmt">₹ 0.00</span>
        </div>
        <div class="total-bar">
          <div class="total-label">Total &nbsp;/&nbsp; कुल राशि</div>
          <div class="total-amt" id="grandTotal">₹ 0.00</div>
        </div>
      </div>
    </div>

    <!-- Thank-you / checkout state -->
    <div class="ty" id="tyScreen" style="display: none">
      <div class="ty-icon">🙏</div>
      <div class="ty-title">Thank You!</div>
      <div class="ty-hindi">धन्यवाद! &nbsp; पधारो फिर।</div>
      <div class="ty-total" id="tyTotal"></div>
    </div>

    <div class="sbar" id="sbar">🟢 Ready for scanning…</div>

    <script>
      const SESSION_ID = "{{ session_id }}";
      let lastCount = 0;
      let lastBroadcastAt = 0; // timestamp of last BroadcastChannel message

      // Read currency from localStorage (same domain as POS frontend)
      // Falls back to ₹ if nothing saved yet
      let PAGE_CUR = "₹";
      try {
        PAGE_CUR = localStorage.getItem("posCurrencySymbol") || "₹";
      } catch {}

      // Apply currency to static HTML placeholders immediately on load
      function applyInitialCurrency() {
        const els = ["grandTotal", "subtotalAmt", "taxAmt"];
        els.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.textContent = PAGE_CUR + "\u00a0" + "0.00";
        });
      }
      applyInitialCurrency();

      async function poll() {
        if (!SESSION_ID) return;
        // If BroadcastChannel delivered data recently, skip poll — it's more up-to-date
        if (Date.now() - lastBroadcastAt < 1500) return;
        try {
          const r = await fetch("/api/display-session/" + SESSION_ID);
          if (!r.ok) return;
          const d = await r.json();
          if (d.success && d.session) render(d.session);
        } catch (e) {
          /* network hiccup – retry next tick */
        }
      }

      function render(sess) {
        const items = sess.items || [];
        const status = sess.status || "active";
        const total = sess.grand_total || 0;

        const idle = document.getElementById("idleScreen");
        const active = document.getElementById("activeScreen");
        const ty = document.getElementById("tyScreen");
        const sbar = document.getElementById("sbar");

        const sn = document.getElementById("shopName");
        if (sn && sess.shop_name) sn.textContent = "🛒 " + sess.shop_name;

        if (status === "checked_out") {
          idle.style.display = "none";
          active.style.display = "none";
          ty.style.display = "flex";
          const tt = document.getElementById("tyTotal");
          const paidCur = (sess && sess.currency) || PAGE_CUR;
          if (tt)
            tt.textContent =
              total > 0
                ? "Total paid: " + paidCur + "\u00a0" + total.toFixed(2)
                : "";
          if (sbar) sbar.textContent = "✅ Payment complete – Thank you!";
          lastCount = 0;
          return;
        }

        if (items.length === 0) {
          idle.style.display = "flex";
          active.style.display = "none";
          ty.style.display = "none";
          if (sbar) sbar.textContent = "🟢 Ready for scanning…";
          lastCount = 0;
          return;
        }

        idle.style.display = "none";
        ty.style.display = "none";
        active.style.display = "flex";
        const isNew = items.length > lastCount;
        // Update PAGE_CUR if server/broadcast sends a currency
        if (sess.currency) {
          PAGE_CUR = sess.currency;
          try {
            localStorage.setItem("posCurrencySymbol", PAGE_CUR);
          } catch {}
        }
        const cur = PAGE_CUR;
        lastCount = items.length;

        const tbody = document.getElementById("itemsBody");
        tbody.innerHTML = "";
        items.forEach((item, i) => {
          const tr = document.createElement("tr");
          // Newest item is at index 0 (top) — highlight it when a new item was added
          if (isNew && i === 0) {
            tr.className = "hi";
            setTimeout(() => tr.classList.remove("hi"), 1800);
          }
          const n = esc(item.name || item.code || "?");
          const q = item.qty || 0;
          const u = item.unit ? "\u00a0" + esc(item.unit) : "";
          const p =
            item.unit_price != null
              ? cur + "\u00a0" + Number(item.unit_price).toFixed(2)
              : "—";
          const a =
            item.line_total != null
              ? cur + "\u00a0" + Number(item.line_total).toFixed(2)
              : "—";
          tr.innerHTML = `<td class="td-name">${n}</td><td class="td-qty">${q}${u}</td><td class="td-rate">${p}</td><td class="td-amt">${a}</td>`;
          tbody.appendChild(tr);
        });

        const gt = document.getElementById("grandTotal");
        if (gt) gt.textContent = cur + "\u00a0" + total.toFixed(2);

        // Subtotal row — show only if tax is applied (otherwise redundant)
        const taxAmt = sess.tax_amt || 0;
        const taxRate = sess.tax_rate || 0;
        const taxName = sess.tax_name || "Tax";
        const subtotal = sess.subtotal != null ? sess.subtotal : total;

        const subtotalRow = document.getElementById("subtotalRow");
        const taxRow = document.getElementById("taxRow");
        const subtotalAmt = document.getElementById("subtotalAmt");
        const taxAmtEl = document.getElementById("taxAmt");
        const taxLabel = document.getElementById("taxLabel");

        if (taxAmt > 0) {
          if (subtotalRow) {
            subtotalRow.style.display = "flex";
          }
          if (subtotalAmt)
            subtotalAmt.textContent = cur + "\u00a0" + subtotal.toFixed(2);
          if (taxRow) {
            taxRow.style.display = "flex";
          }
          if (taxLabel) taxLabel.textContent = taxName + " (" + taxRate + "%)";
          if (taxAmtEl)
            taxAmtEl.textContent = "+ " + cur + "\u00a0" + taxAmt.toFixed(2);
        } else {
          if (subtotalRow) subtotalRow.style.display = "none";
          if (taxRow) taxRow.style.display = "none";
        }

        if (sbar) sbar.textContent = "🟢 Scanning in progress…";
      }

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ① Primary: BroadcastChannel — instant updates when display is on same computer
      try {
        const bc = new BroadcastChannel("kirana-display");
        bc.onmessage = (e) => {
          if (e.data) {
            lastBroadcastAt = Date.now(); // suppress poll for 1.5s after this
            render(e.data);
          }
        };
      } catch (err) {
        // BroadcastChannel not supported — fall through to polling only
      }

      // ② Fallback: polling — works when display is on a separate device
      if (SESSION_ID) {
        setInterval(poll, 400);
        poll();
      }
    </script>
  </body>
</html>
